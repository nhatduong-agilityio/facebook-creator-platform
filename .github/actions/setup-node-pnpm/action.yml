name: Setup Node and pnpm workspace
description: Install Node.js, pnpm, restore pnpm workspace cache, and install workspace dependencies.

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "22"
  pnpm-version:
    description: pnpm version to install
    required: false
    default: "10"
  install:
    description: Whether to install pnpm workspace dependencies
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: Install pnpm workspace dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
