name: Setup Vercel CLI
description: Install the Vercel CLI for preview and production deployments.

inputs:
  version:
    description: Vercel CLI version to install
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install Vercel CLI
      shell: bash
      run: npm install --global vercel@${{ inputs.version }}
