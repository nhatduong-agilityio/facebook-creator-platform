name: Deploy Shared

on:
  workflow_call:
    inputs:
      github-environment:
        description: GitHub Environment name
        required: true
        type: string
      vercel-environment:
        description: Vercel deployment environment
        required: true
        type: string
      docker-channel:
        description: Docker tag channel
        required: true
        type: string
      railway-environment-name:
        description: Railway environment name
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.github-environment }}
  cancel-in-progress: true

jobs:
  docker-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    environment: ${{ inputs.github-environment }}
    outputs:
      image-repository: ${{ steps.image.outputs.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Docker Hub credentials
        id: docker-creds
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          USERNAME="${DOCKER_USERNAME}"
          TOKEN="${DOCKERHUB_TOKEN}"

          if [ -z "$USERNAME" ] || [ -z "$TOKEN" ]; then
            echo "Missing Docker Hub credentials in the '${{ inputs.github-environment }}' GitHub Environment."
            echo "Set DOCKER_USERNAME and DOCKERHUB_TOKEN."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Setup Docker
        uses: ./.github/actions/setup-docker
        with:
          username: ${{ steps.docker-creds.outputs.username }}
          password: ${{ steps.docker-creds.outputs.token }}

      - name: Resolve API image repository
        id: image
        shell: bash
        run: echo "repository=docker.io/${{ steps.docker-creds.outputs.username }}/facebook-creator-platform-api" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.repository }}
          tags: |
            type=raw,value=${{ inputs.docker-channel }}
            type=sha,prefix=${{ inputs.docker-channel }}-
            type=raw,value=latest,enable=${{ inputs.github-environment == 'production' }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          target: runtime
          pull: true
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summarize API image
        shell: bash
        run: |
          {
            echo "### API Image"
            echo "- Repository: ${{ steps.image.outputs.repository }}"
            echo "- Channel: ${{ inputs.docker-channel }}"
            echo "- Tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/  - /'
            echo "- Railway source: Docker Hub image tag"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-api-railway:
    name: Redeploy API on Railway
    runs-on: ubuntu-latest
    needs: docker-api
    environment: ${{ inputs.github-environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Railway deploy settings
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_API: ${{ secrets.RAILWAY_SERVICE_API }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ] || [ -z "$RAILWAY_SERVICE_API" ]; then
            echo "Missing Railway deploy settings for the '${{ inputs.github-environment }}' GitHub Environment."
            echo "Set RAILWAY_TOKEN, RAILWAY_PROJECT_ID and RAILWAY_SERVICE_API."
            exit 1
          fi

      - name: Setup Railway CLI
        uses: ./.github/actions/setup-railway

      - name: Redeploy API service on Railway from Docker Hub
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_API: ${{ secrets.RAILWAY_SERVICE_API }}
        run: |
          railway redeploy \
          --service "$RAILWAY_SERVICE_API" \
          --yes

      - name: Summarize Railway deployment
        shell: bash
        run: |
          {
            echo "### Railway Deployment"
            echo "- Environment: ${{ inputs.railway-environment-name }}"
            echo "- Service: ${{ secrets.RAILWAY_SERVICE_API }}"
            echo "- Source: Docker Hub image tag '${{ inputs.docker-channel }}'"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-web:
    name: Deploy Web on Vercel
    runs-on: ubuntu-latest
    needs: [docker-api, deploy-api-railway]
    environment: ${{ inputs.github-environment }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Doppler CLI
        uses: ./.github/actions/setup-doppler
        with:
          token: ${{ secrets.DOPPLER_TOKEN }}

      - name: Setup Vercel CLI
        uses: ./.github/actions/setup-vercel

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ inputs.vercel-environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output
        run: doppler run --command="vercel build --token=${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        id: vercel-deploy
        shell: bash
        run: |
          if [ "${{ inputs.vercel-environment }}" = "production" ]; then
            DEPLOYMENT_URL="$(vercel deploy --prebuilt --archive=tgz --prod --token=${{ secrets.VERCEL_TOKEN }})"
          else
            DEPLOYMENT_URL="$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})"
          fi

          echo "deployment-url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Summarize Vercel deployment
        shell: bash
        run: |
          {
            echo "### Vercel Deployment"
            echo "- Environment: ${{ inputs.vercel-environment }}"
            echo "- URL: ${{ steps.vercel-deploy.outputs.deployment-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
