name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/api/**"
      - "apps/web/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-shared.yml
    with:
      github-environment: production
      vercel-environment: production
      docker-channel: production
      railway-environment-name: production
    secrets: inherit
